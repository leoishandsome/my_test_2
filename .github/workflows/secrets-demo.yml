name: Secrets Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: 🔐 Use secret safely
      env:
        # 通过 env 使用 Secret
        SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
      run: |
        echo "✅ Secret loaded successfully"
        echo "Secret length: ${#SECRET_KEY}"
        echo "Secret first 3 chars: ${SECRET_KEY:0:3}..."
        echo ""
        echo "现在你知道 Secret 长度是多少，但看不到完整的值"
    
    - name: 🔍 Show what happens with secrets
      run: |
        echo "📝 在日志里，Secret 会被自动隐藏"
        echo "比如这个日志包含 Secret 值，但会被 *** 替代"
    
    - name: 🎭 Demonstrate secret masking
      env:
        MY_SECRET: ${{ secrets.MY_SECRET_KEY }}
      run: |
        echo "🔐 Testing secret masking in action:"
        echo "Real value: $MY_SECRET"
        echo "(上面那行会被 GitHub 自动用 *** 隐藏)"
    
    - name: 📚 Real-world example
      env:
        API_KEY: ${{ secrets.MY_SECRET_KEY }}
      run: |
        echo "🌐 实战例子：调用 API"
        echo "curl -H \"Authorization: Bearer \$API_KEY\" https://api.github.com/user"
        echo ""
        echo "虽然上面 echo 了 API_KEY，但在实际日志里会被隐藏"
