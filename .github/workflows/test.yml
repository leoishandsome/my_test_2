name: Simple Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: List project files
      run: ls -la
    
    - name: Check for HTML files
      run: find . -name "*.html" | head -20
    
    - name: Success message
      run: echo "✅ Project checked successfully!"
