name: Daily Check-in

on:
  schedule:
    - cron: '35 17 * * *'
  workflow_dispatch:  # ← 添加这行，允许手动触发

jobs:
  daily_task:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get current time
      run: |
        echo "Current time: $(date)"
        echo "UTC time: $(date -u)"
    
    - name: Print daily message
      run: echo "✅ Daily check-in completed at $(date)"
    
    - name: Show file count
      run: |
        echo "📁 Total files in repo:"
        find . -type f | wc -l
